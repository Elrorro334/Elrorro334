name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # 1. Clona el repositorio en el entorno virtual (VITAL para poder hacer push después)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Genera los SVG (Añadimos el token para que GitHub no bloquee la petición)
      - name: Generate SVG animations
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Empuja la carpeta 'dist' (que el paso anterior crea automáticamente) a la rama output
      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
